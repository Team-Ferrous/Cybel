name: AES Compliance Hard Gate

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  aes-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Determine Changed Files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          BASE_REF="${GITHUB_BASE_REF:-main}"
          git fetch origin "${BASE_REF}" --depth=1 || true
          CHANGED=$(git diff --name-only "origin/${BASE_REF}"..."${GITHUB_SHA}" | tr '\n' ' ' || true)
          if [ -z "${CHANGED// }" ]; then
            CHANGED=$(git ls-files '*.py' | tr '\n' ' ')
          fi
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Run Phase 6 Command Flow
        run: |
          python -m infrastructure.ci.phase6_hard_gate collect \
            --changed-files "${{ steps.changed.outputs.changed }}"

      - name: Architecture Fitness
        run: |
          python -c "from core.aes.fitness_functions import run_all_fitness_checks; result = run_all_fitness_checks('.'); print(result); raise SystemExit(0 if result['passed'] else 1)"

      - name: Generate SBOM
        run: |
          python scripts/aes_generate_sbom.py --output .anvil/artifacts/phase6/sbom.cyclonedx.json --format cyclonedx

      - name: Enforce Hard-Gate Policy
        run: |
          python -m infrastructure.ci.phase6_hard_gate enforce

      - name: Upload AES Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aes-compliance-artifacts
          path: .anvil/artifacts/phase6
