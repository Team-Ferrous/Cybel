name: aes-compliance

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  aes-hard-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Capture changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          BASE_REF="${GITHUB_BASE_REF:-main}"
          git fetch origin "${BASE_REF}" --depth=1 || true
          CHANGED=$(git diff --name-only "origin/${BASE_REF}"..."${GITHUB_SHA}" | tr '\n' ' ' || true)
          if [ -z "${CHANGED// }" ]; then
            CHANGED=$(git ls-files '*.py' | tr '\n' ' ')
          fi
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Run Phase 6 command flow
        shell: bash
        run: |
          python -m infrastructure.ci.phase6_hard_gate collect \
            --changed-files "${{ steps.changed.outputs.changed }}"

      - name: Enforce AES hard-gate policy
        run: |
          python -m infrastructure.ci.phase6_hard_gate enforce

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aes-compliance-artifacts
          path: .anvil/artifacts/phase6
