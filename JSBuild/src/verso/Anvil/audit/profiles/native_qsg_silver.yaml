schema_version: native_qsg_suite.v1
profile_name: silver
models:
  - granite4:tiny-h
  - qwen3.5:4b
  - qwen3.5:9b
max_parallel_models: 1
strict_host: true
require_saguaro: true
require_perf: true
host_contract_id: auto
affinity_policy: repair_allowed
tuning_contract_policy: optional
preflight_strictness: audit
assurance_level: AAL-2
evidence_class: certification
force_parallel_decode: true
forbid_autoregressive_fallback: true
enabled_lanes:
  - canonical_all_on
  - continuous_scheduler
  - kernel_microbench
  - quality_eval
canonical_decode_threads:
  - null
canonical_batch_threads:
  - null
scenario_pack:
  canonical_prompt: "In 3-4 sentences, explain how AVX2 and OpenMP improve CPU LLM inference throughput and latency, using concrete mechanisms, cache locality, KV reuse, and avoiding repetition."
  canonical_max_new_tokens: 32
  canonical_context_length: 2048
  warmup_runs: 1
  measured_runs: 2
  thread_matrix_ubatch: [32]
  continuous_concurrency: [1, 2, 4]
  continuous_prompt_classes: [short, medium]
  continuous_scheduler_policies: [fcfs, priority]
kernel_microbench:
  warmups: 4
  iterations: 48
  synthetic_lengths: [32, 128, 256]
  target_kernels:
    - embedding_lookup
    - attention_proj
    - attention_rope_kv
    - attention_decode
    - attention_out_proj
    - ffn_gate_up
    - ffn_down
    - ssm_projection
    - ssm_conv
    - ssm_recurrent
    - ssm_output
    - lm_head
    - sanitize
quality_eval:
  perplexity_corpus: benchmarks/corpora/perplexity_corpus.jsonl
  confidence_corpus: benchmarks/corpora/confidence_corpus.jsonl
  rubric_corpus: benchmarks/corpora/coherence_rubric.jsonl
  accuracy_corpus: benchmarks/corpora/accuracy_corpus.jsonl
  max_samples_per_family: 0
host_requirements:
  cpu_governor: performance
  thp_modes: [never, madvise]
  min_visible_threads: 1
  enforce_min_visible_threads: false
