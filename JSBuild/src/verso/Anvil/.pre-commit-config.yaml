repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff check
        entry: ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: Ruff format
        entry: ruff format
        language: system
        types: [python]
      - id: aes-check
        name: AES check
        entry: saguaro aes-check .
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: saguaro-verify
        name: AES verify (saguaro)
        entry: saguaro verify . --engines native,ruff,semantic,aes
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: validate-prompt-contracts
        name: validate-prompt-contracts
        entry: python scripts/validate_prompt_contracts.py --repo .
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push]
