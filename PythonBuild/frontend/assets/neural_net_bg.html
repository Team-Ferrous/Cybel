<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Neural Lattice Visualization</title>
    <style>
        body { margin: 0; overflow: hidden;}
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, nodes = [], signals = [];
        let linesMesh;
        const NODE_COUNT = 150; // Increased for more density
        const MAX_DISTANCE = 120;
        const SIGNAL_SPEED = 0.015;
        const SPHERE_RADIUS = 200;

        const urlParams = new URLSearchParams(window.location.search);
        const colorParam = urlParams.get('color');
        const passedAccent = colorParam ? parseInt('0x' + colorParam) : 0x00f2ff;

        function init() {
            document.body.style.background = '#020205';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
            camera.position.z = 500;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setClearColor(0x020205, 1);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);


            // Create Nodes in a Spherical distribution
            const nodeGeometry = new THREE.SphereGeometry(1.5, 8, 8);
            for (let i = 0; i < NODE_COUNT; i++) {
                const material = new THREE.MeshBasicMaterial({ 
                    color: passedAccent,
                    transparent: true,
                    opacity: 0.9
                });
                const node = new THREE.Mesh(nodeGeometry, material);
                
                // Random point inside a sphere
                const phi = Math.acos(-1 + (2 * i) / NODE_COUNT);
                const theta = Math.sqrt(NODE_COUNT * Math.PI) * phi;
                
                // Add some randomness to the shell
                const r = SPHERE_RADIUS * Math.pow(Math.random(), 0.3); 
                
                node.position.set(
                    r * Math.cos(theta) * Math.sin(phi),
                    r * Math.sin(theta) * Math.sin(phi),
                    r * Math.cos(phi)
                );
                
                node.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.3,
                        (Math.random() - 0.5) * 0.3,
                        (Math.random() - 0.5) * 0.3
                    )
                };
                
                nodes.push(node);
                scene.add(node);
            }

            // Initialize the line segments for the lattice
            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: passedAccent, 
                transparent: true, 
                opacity: 0.15 
            });
            const lineGeometry = new THREE.BufferGeometry();
            linesMesh = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(linesMesh);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function createSignal(startNode, endNode) {
            const geometry = new THREE.SphereGeometry(1, 6, 6);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const signal = new THREE.Mesh(geometry, material);
            
            signal.userData = {
                start: startNode.position,
                end: endNode.position,
                progress: 0,
                targetNode: endNode
            };
            
            scene.add(signal);
            signals.push(signal);
        }

        function updateLattice() {
            const positions = [];
            
            for (let i = 0; i < nodes.length; i++) {
                let connectionsCount = 0;
                for (let j = i + 1; j < nodes.length; j++) {
                    const dist = nodes[i].position.distanceTo(nodes[j].position);
                    
                    if (dist < MAX_DISTANCE) {
                        positions.push(
                            nodes[i].position.x, nodes[i].position.y, nodes[i].position.z,
                            nodes[j].position.x, nodes[j].position.y, nodes[j].position.z
                        );
                        connectionsCount++;

                        // Spawn signals occasionally
                        if (Math.random() < 0.0005) {
                            createSignal(nodes[i], nodes[j]);
                        }
                    }
                }
            }
            
            linesMesh.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            linesMesh.geometry.attributes.position.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);

            nodes.forEach(node => {
                node.position.add(node.userData.velocity);
                
                // Keep within spherical bounds
                const distFromCenter = node.position.length();
                if (distFromCenter > SPHERE_RADIUS) {
                    node.userData.velocity.multiplyScalar(-1);
                }

                const scale = 1 + Math.sin(Date.now() * 0.003 + node.position.x) * 0.3;
                node.scale.set(scale, scale, scale);
            });

            // Handle Signals
            for (let i = signals.length - 1; i >= 0; i--) {
                const s = signals[i];
                s.userData.progress += SIGNAL_SPEED;
                
                if (s.userData.progress >= 1) {
                    scene.remove(s);
                    signals.splice(i, 1);
                } else {
                    s.position.lerpVectors(s.userData.start, s.userData.end, s.userData.progress);
                }
            }

            updateLattice();

            scene.rotation.y += 0.0015;
            scene.rotation.z += 0.0005;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;

        window.addEventListener('message', (e) => {
            if (e.data?.theme === 'light') {
                document.body.style.background = '#f5f7fb';
                if (renderer) renderer.setClearColor(0xf5f7fb, 1);
            } else if (e.data?.theme === 'dark') {
                document.body.style.background = '#020205';
                if (renderer) renderer.setClearColor(0x020205, 1);
            }

            if (e.data?.accent) {
                const newColor = parseInt('0x' + e.data.accent);
                nodes.forEach(node => node.material.color.setHex(newColor));
                if (linesMesh) linesMesh.material.color.setHex(newColor);
            }
        });
    </script>
</body>
</html>
